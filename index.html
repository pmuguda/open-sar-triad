<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>open-sar-triad — ICEYE · Umbra · Capella</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <span class="logo">open-sar-triad</span>
    <span class="tagline">Open SAR datasets from ICEYE · Umbra · Capella</span>
  </div>
  <div class="header-right">
    <span id="scene-count" class="badge">—</span>
    <span class="badge-label">scenes</span>
    <a href="https://github.com/pmuguda/open-sar-triad" target="_blank" class="gh-link" title="GitHub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.29 9.42 7.86 10.95.57.1.78-.25.78-.55v-2.1c-3.19.69-3.87-1.54-3.87-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.05-.71.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.23-1.27-5.23-5.67 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.45.11-3.02 0 0 .96-.31 3.15 1.18a10.97 10.97 0 0 1 2.87-.39c.97.01 1.95.13 2.87.39 2.18-1.49 3.14-1.18 3.14-1.18.63 1.57.23 2.73.11 3.02.74.8 1.18 1.82 1.18 3.07 0 4.41-2.69 5.38-5.25 5.66.41.36.78 1.06.78 2.13v3.16c0 .31.2.66.79.55C20.21 21.41 23.5 17.1 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
    </a>
  </div>
</header>

<!-- ── Layout ────────────────────────────────────────────────── -->
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">

    <section class="filter-section">
      <h3>Providers</h3>
      <div class="provider-toggles">
        <label class="provider-chip iceye">
          <input type="checkbox" id="tog-iceye" checked />
          <span class="dot"></span> ICEYE
          <span class="count" id="cnt-iceye">—</span>
        </label>
        <label class="provider-chip umbra">
          <input type="checkbox" id="tog-umbra" checked />
          <span class="dot"></span> Umbra
          <span class="count" id="cnt-umbra">—</span>
        </label>
        <label class="provider-chip capella">
          <input type="checkbox" id="tog-capella" checked />
          <span class="dot"></span> Capella
          <span class="count" id="cnt-capella">—</span>
        </label>
      </div>
    </section>

    <section class="filter-section">
      <h3>Date Range</h3>
      <div class="date-inputs">
        <input type="date" id="date-from" placeholder="From" />
        <input type="date" id="date-to" placeholder="To" />
      </div>
    </section>

    <section class="filter-section">
      <h3>Sensor Mode</h3>
      <input type="text" id="mode-filter" placeholder="e.g. spotlight, stripmap…" />
    </section>

    <section class="filter-section">
      <h3>Location Search</h3>
      <div class="location-row">
        <input type="text" id="location-input" placeholder="City or place name…" />
        <button id="location-btn">Go</button>
      </div>
    </section>

    <section class="filter-section">
      <h3>BBox Filter</h3>
      <button id="draw-btn" class="draw-btn">Draw BBox</button>
      <button id="clear-bbox-btn" class="secondary-btn" style="display:none">Clear BBox</button>
    </section>

    <section class="filter-section">
      <button id="reset-btn" class="reset-btn">Reset All Filters</button>
    </section>

    <section class="filter-section stats-section">
      <h3>Visible Scenes</h3>
      <div id="stats">
        <div class="stat-row"><span class="stat-dot iceye-dot"></span><span id="vis-iceye">—</span> ICEYE</div>
        <div class="stat-row"><span class="stat-dot umbra-dot"></span><span id="vis-umbra">—</span> Umbra</div>
        <div class="stat-row"><span class="stat-dot capella-dot"></span><span id="vis-capella">—</span> Capella</div>
      </div>
    </section>

  </aside>

  <!-- Map -->
  <div id="map"></div>

  <!-- Detail panel -->
  <div id="detail-panel" class="hidden">
    <button id="detail-close">✕</button>
    <div id="detail-content"></div>
  </div>

</div>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <p>Loading SAR scenes…</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="js/app.js"></script>
</body>
</html>
